# This workflow checks if a pull request from the local repository is linked to an issue.
---
name: Local PR Checks
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to validate'
        required: true
        type: string
  pull_request:

permissions:
  contents: read  # Required by actions/checkout to fetch code.
  pull-requests: write  # Required to comment on PRs.

jobs:
  call-common:
    uses: ./.github/workflows/check-pr.yml
    with:
      run_on_fork: false
      pr_number: ${{ inputs.pr_number || '' }}
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
